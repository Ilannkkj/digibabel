<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sources/style/index.css">
    <link rel="shortcut icon" href="sources/images/favicon-digibabel.png" type="image/x-icon">
    <title>Digibabel</title>
</head>
<body>

    <!-- NavBar -->
    <ul class="sidenav">
        <img src="sources/images/logo-digibabel.png" class="logo">
        <img src="sources/images/livro-background-navbar-home.png" alt="Background barra lateral" class="background-navbar-home">

        <h4 class="texto-rodape">Digibabel - 2026</h4>
    </ul>



    <main>
        <div class="content">
        
    <div>

        <form class="formularios" id="form-login" method="POST">
            <h1>FAÇA <br> 
            LOGIN</h1>

            <div class="input-forms">
                <img src="sources/icons/icone-nome.svg" alt="Icone Nome">
                <label for="nomeLogin"></label>
                <input type="text" id="nomeLogin" placeholder="Nome" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-senha.svg" alt="Icone Senha">
                <label for="senhaLogin"></label>
                <input type="password" id="senhaLogin" placeholder="Senha" required> <br> <br>
            </div> <br>  
            
            <button type="submit" class="botao-form">Logar</button> <br> <br>

            <a href="#" id="link-cadastro">Não possui conta? Cadastre-se</a>

        </form>

    </div>

    <div>

        <form class="formularios" id="form-cadastro" method="POST">
            <h1>CADASTRE-SE </h1>

            <div class="input-forms">
                <img src="sources/icons/icone-nome.svg" alt="Icone Nome">
                <label for="nomeCadastro"></label>
                <input type="text" id="nomeCadastro" placeholder="Nome" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-email.svg" alt="Icone Senha">
                <label for="emailCadastro"></label>
                <input type="email" id="emailCadastro" placeholder="E-mail" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-senha.svg" alt="Icone Senha">
                <label for="senhaCadastro"></label>
                <input type="password" id="senhaCadastro" placeholder="Senha" required> <br> <br>
            </div> <br> 
            
            <div class="input-forms">
                <img src="sources/icons/icone-tipoConta.svg" alt="Icone Tipo Conta">
                <label for="tipoPerfil"></label>
                <select id="tipoPerfil">
                    <option value="bibliotecario">Bibliotecario</option>
                    <option value="leitor">Leitor</option>
                </select>
            </div> <br> 
            
            <button type="submit" class="botao-form">Cadastrar</button> <br> <br>
            
            <a href="#" id="link-login">Possui conta? Faça Login</a>
        </form>
    </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
