<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sources/style/index.css">
    <link rel="shortcut icon" href="sources/images/favicon-digibabel.png" type="image/x-icon">
    <title>Digibabel</title>
</head>
<body>

    <!-- NavBar -->
    <ul class="sidenav">
        <img src="sources/images/logo-digibabel.png" class="logo">
        <img src="sources/images/livro-background-navbar-home.png" alt="Background barra lateral" class="background-navbar-home">

        <h4 class="texto-rodape">Digibabel - 2026</h4>
    </ul>



    <main>
        <div class="content">
        
    <div class="form-login">

        <h1>FAÇA <br> 
        LOGIN</h1>

        <form class="formularios" id="login-form" action="POST">
            <div class="input-forms">
                <img src="sources/icons/icone-nome.svg" alt="Icone Nome">
                <label for="nome"></label>
                <input type="text" id="nome" placeholder="Nome" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-senha.svg" alt="Icone Senha">
                <label for="senha"></label>
                <input type="password" id="senha" placeholder="Senha" required> <br> <br>
            </div> <br>  
            
            <button class="botao-form">Logar</button> <br> <br>

        </form>

        <a href="#" id="link-cadastro">Não possui conta? Cadastre-se</a>

    </div>

    <div class="form-cadastro">

        <h1>CADASTRE-SE </h1>

        <form class="formularios" id="login-form" action="POST">
            <div class="input-forms">
                <img src="sources/icons/icone-nome.svg" alt="Icone Nome">
                <label for="nome"></label>
                <input type="text" id="nome" placeholder="Nome" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-email.svg" alt="Icone Senha">
                <label for="email"></label>
                <input type="email" id="email" placeholder="E-mail" required> <br> <br>
            </div> <br>

            <div class="input-forms">
                <img src="sources/icons/icone-senha.svg" alt="Icone Senha">
                <label for="senha"></label>
                <input type="password" id="password" placeholder="Senha" required> <br> <br>
            </div> <br>  
            
            <button class="botao-form">Cadastrar</button> <br> <br>

        </form>
    </main>
    <script src="app.js"></script>
</body>
</html>
